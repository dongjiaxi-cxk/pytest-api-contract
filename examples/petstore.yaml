openapi: "3.0.2"
info:
  title: Petstore API
  version: "1.0"
servers:
  - url: https://petstore3.swagger.io/api/v3
paths:
  /pet/findByStatus:
    get:
      operationId: findPetsByStatus
      parameters:
        - name: status
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                    status:
                      type: string
  /store/inventory:
    get:
      operationId: getInventory
      responses:
        "200":
          description: inventory
          content:
            application/json:
              schema:
                type: object